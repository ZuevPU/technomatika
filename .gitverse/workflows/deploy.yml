# Сайт публикуется из папки docs/ на ветке master.
# CI-сборка на GitVerse отключена: runner падает с
# "no space left on device" при клонировании actions/checkout.
# В настройках: Страницы → источник «Ветка» → папка docs.

name: GitVerse Pages (docs branch)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Pages publish mode
        run: |
          echo "GitVerse Pages: branch master / folder docs"
          echo "Static site is committed in docs/ — no runner build needed."
